<table>
  <thead>
    <tr>
      <th>Cell ID</th>
      <th>Timestamp</th>
      <th>Lat</th>
      <th>Lon</th>
      <th>t+1h</th>
      <th>t+3h</th>
      <th>t+6h</th>
      <th>t+12h</th>
    </tr>
  </thead>
  <tbody>
    {% for row in rows %}
    <tr>
      <td>{{ row.cell_id }}</td>
      <td>{{ row.timestamp }}</td>
      <td>{{ row.lat }}</td>
      <td>{{ row.lon }}</td>
      <td>{{ row.precipitation_t1 }}</td>
      <td>{{ row.precipitation_t3 }}</td>
      <td>{{ row.precipitation_t6 }}</td>
      <td>{{ row.precipitation_t12 }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
