<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org"></script>
  </head>
  <body>
    <div class="flex flex-col items-center">
      <h1 class="font-bold">Weather Forecasts</h1>
    </div>
    <div class="mx-auto max-w-5xl">
      <div class="flex justify-around mb-2">
        <button class="px-4 py-2 bg-gray-800 text-white rounded shadow hover:bg-gray-600" hx-get="/map?horizon=precipitation_t1" hx-target="#map">t+1h</button>
        <button class="px-4 py-2 bg-gray-800 text-white rounded shadow hover:bg-gray-600" hx-get="/map?horizon=precipitation_t3" hx-target="#map">t+3h</button>
        <button class="px-4 py-2 bg-gray-800 text-white rounded shadow hover:bg-gray-600" hx-get="/map?horizon=precipitation_t6" hx-target="#map">t+6h</button>
        <button class="px-4 py-2 bg-gray-800 text-white rounded shadow hover:bg-gray-600" hx-get="/map?horizon=precipitation_t12" hx-target="#map">t+12h</button>
      </div>
      <div id="map" hx-trigger="load" hx-get="/map?horizon=precipitation_t1" class="w-full">Loading...</div>
    </div>
  </body>
</html>
