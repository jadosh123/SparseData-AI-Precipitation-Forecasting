services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: rain_backend
    command: tail -f /dev/null
    env_file:
      - ./.env
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=sqlite:////app/data/weather.db
      - PYTHONPATH=/app/src
    ports:
      - "8000:8000"
    restart: "no"